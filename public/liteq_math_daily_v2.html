const TOTAL_PTS = QS.reduce((s, q) => s + q.pts, 0); // 20

/* ──────────────── Helpers ──────────────── */
function fmtTime(sec) {
  const m = String(Math.floor(sec / 60)).padStart(2, "0");
  const s = String(sec % 60).padStart(2, "0");
  return `${m}:${s}`;
}

function recToSec(rec) {
  const [m, s] = rec.split(":").map(Number);
  return m * 60 + s;
}

function hasLatex(str) {
  return /[\\{}_^]/.test(str);
}

function stripCircled(str) {
  return str.replace(/^[①②③④⑤]\s*/, "");
}

/* ──────────────── Tex Component ──────────────── */
function Tex({ math, display = false }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current && window.katex) {
      try {
        window.katex.render(math, ref.current, {
          throwOnError: false,
          displayMode: display,
        });
      } catch (_) {}
    }
  }, [math, display]);
  return <span ref={ref} />;
}

/* ──────────────── Inline Option Renderer ──────────────── */
function OptLabel({ text }) {
  const circled = text.match(/^([①②③④⑤])\s*/);
  const prefix = circled ? circled[1] : "";
  const body = stripCircled(text);
  if (hasLatex(body)) {
    return (
      <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
        {prefix && (
          <span style={{ fontWeight: 600, fontSize: 15 }}>{prefix}</span>
        )}
        <Tex math={body} />
      </span>
    );
  }
  return <span>{text}</span>;
}

/* ──────────────── Difficulty Stars ──────────────── */
function Stars({ n }) {
  return (
    <span style={{ letterSpacing: 1 }}>
      {Array.from({ length: 3 }, (_, i) => (
        <span
          key={i}
          style={{ color: i < n ? T.accent : T.textFaint, fontSize: 13 }}
        >
          ★
        </span>
      ))}
    </span>
  );
}

/* ──────────────── Donut Chart (SVG) ──────────────── */
function Donut({ ratio, size = 140, stroke = 14 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const pct = Math.round(ratio * 100);
  const color = ratio >= 0.7 ? T.correct : ratio >= 0.4 ? T.accent : T.wrong;
  return (
    <svg width={size} height={size} style={{ display: "block", margin: "0 auto" }}>
      <circle
        cx={size / 2}
        cy={size / 2}
        r={r}
        fill="none"
        stroke={T.border}
        strokeWidth={stroke}
      />
      <circle
        cx={size / 2}
        cy={size / 2}
        r={r}
        fill="none"
        stroke={color}
        strokeWidth={stroke}
        strokeDasharray={circ}
        strokeDashoffset={circ * (1 - ratio)}
        strokeLinecap="round"
        transform={`rotate(-90 ${size / 2} ${size / 2})`}
        style={{ transition: "stroke-dashoffset 0.8s ease" }}
      />
      <text
        x={size / 2}
        y={size / 2 - 6}
        textAnchor="middle"
        style={{ fontSize: 28, fontWeight: 700, fill: T.text }}
      >
        {pct}%
      </text>
      <text
        x={size / 2}
        y={size / 2 + 16}
        textAnchor="middle"
        style={{ fontSize: 13, fill: T.textSec }}
      >
        정답률
      </text>
    </svg>
  );
}

      link.href =
        "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css";
      document.head.appendChild(link);
    }
    if (!window.katex) {
      const script = document.createElement("script");
      script.src =
        "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js";

      document.body.appendChild(script);
    } else {
      setKatexReady(true);
    }
  }, []);

  /* ── Global timer ── */
  React.useEffect(() => {
    if (screen === "quiz") {
      timerRef.current = setInterval(() => setElapsed((e) => e + 1), 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [screen]);

  /* ── Start quiz ── */
  function startQuiz() {
    setScreen("quiz");
    setQi(0);
    setAnswers({});
    setElapsed(0);
    qStartRef.current = 0;
    setShowSol(false);
    setShortInput("");
  }

  /* ── Answer a question ── */
  function handleAnswer(selected) {
    if (answers[qi] !== undefined) return; // already answered
    const q = QS[qi];
    const isCorrect =
      q.mode === "choice"
        ? selected === q.ans
        : String(selected).trim() === String(q.ans).trim();
    const timeSec = elapsed - qStartRef.current;
    setAnswers((prev) => ({
      ...prev,
      [qi]: { selected, correct: isCorrect, timeSec },
    }));
  }

  /* ── Next question ── */
  function handleNext() {
    setShowSol(false);
    setShortInput("");
    if (qi < QS.length - 1) {
      const nextIdx = qi + 1;
      setQi(nextIdx);
      qStartRef.current = elapsed;
    } else {
      clearInterval(timerRef.current);
      setScreen("result");
    }

    let correctCount = 0;
    const rows = QS.map((q, i) => {
      const a = answers[i];

        correctCount++;

      return { ...q, answer: a };
    });
    return { score, correctCount, rows };

                fontSize: 12,
                color: T.textTertiary,
                marginBottom: 18,
              }}
            >
              권장 풀이 시간 {q.rec}
            </div>

            {/* Stem */}
            <div
              style={{
                fontSize: 16,
                lineHeight: 1.7,
                color: T.text,
                marginBottom: 8,
              }}
            >
              <strong>Q{q.id}.</strong>{" "}
              {hasLatex(q.stem) ? <Tex math={q.stem} /> : q.stem}
            </div>

            {/* Display Tex */}
            {q.tex && (
              <div
                style={{
                  background: T.tagBg,
                  borderRadius: 12,
                  padding: "16px 18px",
                  margin: "12px 0 20px",
                  textAlign: "center",
                  overflowX: "auto",
                }}
              >
                <Tex math={q.tex} display />
              </div>
            )}

            {/* ── Choice Mode ── */}
            {q.mode === "choice" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 16 }}>
                {q.opts.map((opt, i) => {
                  const idx = i; // 0-based index matching ans (0-based)
                  const isSelected = answered && answers[qi].selected === idx;
                  const isCorrectOpt = idx === q.ans;
                  let bg = T.surface;
                  let border = T.border;
                  let labelColor = T.text;

                  if (answered) {
                    if (isCorrectOpt) {
                      bg = T.correctSoft;
                      border = T.correctBorder;
                      labelColor = T.correct;
                    } else if (isSelected && !isCorrectOpt) {
                      bg = T.wrongSoft;
                      border = T.wrongBorder;
                      labelColor = T.wrong;
                    }
                  }

                  return (
                    <button
                      key={i}
                      onClick={() => handleAnswer(idx)}
                      disabled={answered}
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: 10,
                        width: "100%",
                        textAlign: "left",
                        padding: "13px 16px",
                        borderRadius: 12,
                        border: `1.5px solid ${border}`,
                        background: bg,
                        color: labelColor,
                        fontSize: 15,
                        cursor: answered ? "default" : "pointer",
                        transition: "all .15s",
                        fontFamily: "inherit",
                      }}
                      onMouseEnter={(e) => {
                        if (!answered)
                          e.currentTarget.style.borderColor = T.borderActive;
                      }}
                      onMouseLeave={(e) => {
                        if (!answered)
                          e.currentTarget.style.borderColor = T.border;
                      }}
                    >
                      {answered && isCorrectOpt && (
                        <span style={{ color: T.correct, fontWeight: 700, fontSize: 17 }}>O</span>
                      )}
                      {answered && isSelected && !isCorrectOpt && (
                        <span style={{ color: T.wrong, fontWeight: 700, fontSize: 17 }}>X</span>
                      )}
                      <OptLabel text={opt} />
                    </button>
                  );
                })}
              </div>
            )}

            {/* ── Short Answer Mode ── */}
            {q.mode === "short" && !answered && (
              <div
                style={{
                  display: "flex",
                  gap: 10,
                  marginTop: 20,
                  alignItems: "center",
                }}
              >
                <input
                  type="number"
                  value={shortInput}
                  onChange={(e) => setShortInput(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter" && shortInput.trim())
                      handleAnswer(shortInput.trim());
                  }}
                  placeholder="답을 입력하세요"
                  style={{
                    flex: 1,
                    padding: "13px 16px",
                    borderRadius: 12,
                    border: `1.5px solid ${T.border}`,
                    fontSize: 18,
                    fontWeight: 600,
                    fontFamily: "inherit",
                    outline: "none",
                    background: T.surface,
                    color: T.text,
                    transition: "border-color .15s",
                  }}
                  onFocus={(e) => (e.target.style.borderColor = T.accent)}
                  onBlur={(e) => (e.target.style.borderColor = T.border)}
                />
                <button
                  onClick={() => {
                    if (shortInput.trim()) handleAnswer(shortInput.trim());
                  }}
                  style={{
                    padding: "13px 22px",
                    borderRadius: 12,
                    border: "none",
                    background: shortInput.trim() ? T.accent : T.textFaint,
                    color: "#fff",
                    fontSize: 15,
                    fontWeight: 700,
                    cursor: shortInput.trim() ? "pointer" : "default",
                    fontFamily: "inherit",
                  }}
                >
                  확인
                </button>
              </div>
            )}

            {/* ── Short answer result ── */}
            {q.mode === "short" && answered && (
              <div
                style={{
                  marginTop: 20,
                  padding: "14px 18px",
                  borderRadius: 12,
                  background: isCorrect ? T.correctSoft : T.wrongSoft,
                  border: `1.5px solid ${isCorrect ? T.correctBorder : T.wrongBorder}`,
                  display: "flex",
                  alignItems: "center",
                  gap: 12,
                }}
              >
                <span
                  style={{
                    fontSize: 22,
                    fontWeight: 800,
                    color: isCorrect ? T.correct : T.wrong,
                  }}
                >
                  {isCorrect ? "O" : "X"}
                </span>
                <div>
                  <div style={{ fontSize: 14, color: T.textSec }}>
                    내 답: <strong style={{ color: T.text }}>{answers[qi].selected}</strong>
                  </div>
                  {!isCorrect && (
                    <div style={{ fontSize: 14, color: T.correct, fontWeight: 600, marginTop: 2 }}>
                      정답: {q.ans}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ── Grading feedback (choice mode) ── */}
            {q.mode === "choice" && answered && (
              <div
                style={{
                  marginTop: 16,
                  textAlign: "center",
                  fontSize: 15,
                  fontWeight: 600,
                  color: isCorrect ? T.correct : T.wrong,
                }}
              >
                {isCorrect
                  ? "정답이에요! 잘했어요 ✓"
                  : `오답이에요. 정답은 ${q.opts[q.ans]} 입니다.`}
              </div>
            )}

            {/* ── Solution toggle ── */}
            {answered && (
              <div style={{ marginTop: 18 }}>
                <button
                  onClick={() => setShowSol(!showSol)}
                  style={{
                    width: "100%",
                    padding: "11px 0",
                    borderRadius: 10,
                    border: `1px solid ${T.border}`,
                    background: showSol ? T.tagBg : T.surface,
                    color: T.textSec,
                    fontSize: 14,
                    fontWeight: 600,
                    cursor: "pointer",
                    fontFamily: "inherit",
                    transition: "background .15s",
                  }}
                >
                  {showSol ? "풀이 닫기 ▲" : "풀이 보기 ▼"}
                </button>

                {showSol && (
                  <div
                    style={{
                      marginTop: 12,
                      padding: "18px",
                      borderRadius: 12,
                      background: T.tagBg,
                      border: `1px solid ${T.border}`,
                    }}
                  >
                    {/* Text solution */}
                    <div
                      style={{
                        fontSize: 14,
                        lineHeight: 1.8,
                        color: T.text,
                        whiteSpace: "pre-wrap",
                        marginBottom: q.solTex ? 14 : 0,
                      }}
                    >
                      {q.solution}
                    </div>
                    {/* Tex solution */}
                    {q.solTex && (
                      <div
                        style={{
                          background: T.surface,
                          borderRadius: 10,
                          padding: "14px 16px",
                          textAlign: "center",
                          overflowX: "auto",
                        }}
                      >
                        <Tex math={q.solTex} display />
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>

          {/* ── Next / Finish Button ── */}
          {answered && (
            <button
              onClick={handleNext}
              style={{
                display: "block",
                width: "100%",
                maxWidth: 600,
                margin: "20px auto 0",
                padding: "15px 0",
                borderRadius: 14,
                border: "none",
                background: T.accent,
                color: "#fff",
                fontSize: 16,
                fontWeight: 700,
                cursor: "pointer",
                fontFamily: "inherit",
                transition: "opacity .15s",
              }}
              onMouseEnter={(e) => (e.currentTarget.style.opacity = "0.9")}
              onMouseLeave={(e) => (e.currentTarget.style.opacity = "1")}
            >
              {qi < QS.length - 1 ? "다음 문제 →" : "결과 보기"}
            </button>
          )}
        </div>
      </div>
    );
  }

  /* ──────────── RESULT SCREEN ──────────── */
  if (screen === "result") {
    const { score, correctCount, rows } = getResults();
    const ratio = correctCount / QS.length;

    let encourage = "오늘도 한 걸음 나아갔어요.";
    if (ratio >= 0.85) encourage = "완벽에 가까워요! 이 조자를 유지해봐요.";
    else if (ratio >= 0.7) encourage = "오늘의 실력, 확실히 성장 중이에요.";
    else if (ratio >= 0.5) encourage = "절반 이상 맞혔어요. 내일은 더 잘할 수 있어요.";
    else encourage = "오늘 발견한 약점이 내일의 무기예요.";

    return (
      <div style={{ minHeight: "100vh", background: T.bg, padding: "20px 16px 40px" }}>
        <div style={{ maxWidth: 600, margin: "0 auto" }}>
          {/* Header */}
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <h2
              style={{
                fontSize: 22,
                fontWeight: 800,
                color: T.text,
                marginBottom: 4,
              }}
            >
              수학 일간지 결과
            </h2>
            <p style={{ fontSize: 14, color: T.textSec }}>
              총 소요 시간 {fmtTime(elapsed)}
            </p>
          </div>

          {/* Score card */}
          <div
            style={{
              background: T.surface,
              borderRadius: 16,
              padding: "32px 24px",
              boxShadow: "0 1px 12px rgba(0,0,0,0.04)",
              border: `1px solid ${T.border}`,
              textAlign: "center",
              marginBottom: 20,
            }}
          >
            <Donut ratio={ratio} />
            <div
              style={{
                marginTop: 20,
                fontSize: 28,
                fontWeight: 800,
                color: T.text,
              }}
            >
              {score}{" "}
              <span style={{ fontSize: 18, fontWeight: 400, color: T.textSec }}>
                / {TOTAL_PTS}점
              </span>
            </div>
            <div
              style={{
                fontSize: 14,
                color: T.textSec,
                marginTop: 4,
              }}
            >
              {correctCount}문제 정답 · {QS.length - correctCount}문제 오답
            </div>
            <div
              style={{
                marginTop: 18,
                fontSize: 15,
                color: T.accent,
                fontWeight: 600,
                lineHeight: 1.5,
              }}
            >
              {encourage}
            </div>
          </div>

          {/* Per-question list */}
          <div
            style={{
              background: T.surface,
              borderRadius: 16,
              boxShadow: "0 1px 12px rgba(0,0,0,0.04)",
              border: `1px solid ${T.border}`,
              overflow: "hidden",
              marginBottom: 24,
            }}
          >
            <div
              style={{
                padding: "14px 18px",
                borderBottom: `1px solid ${T.border}`,
                fontSize: 14,
                fontWeight: 700,
                color: T.text,
              }}
            >
              문항별 결과
            </div>
            {rows.map((r, i) => {
              const a = r.answer;
              const ok = a && a.correct;
              return (
                <div
                  key={i}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 10,
                    padding: "13px 18px",
                    borderBottom:
                      i < rows.length - 1 ? `1px solid ${T.border}` : "none",
                  }}
                >
                  {/* O/X */}
                  <span
                    style={{
                      width: 28,
                      height: 28,
                      borderRadius: "50%",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      fontSize: 14,
                      fontWeight: 800,
                      color: "#fff",
                      background: ok ? T.correct : T.wrong,
                      flexShrink: 0,
                    }}
                  >
                    {ok ? "O" : "X"}
                  </span>

                  {/* Info */}
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div
                      style={{
                        fontSize: 14,
                        fontWeight: 600,
                        color: T.text,
                        whiteSpace: "nowrap",
                        overflow: "hidden",
                        textOverflow: "ellipsis",
                      }}
                    >
                      Q{r.id}. {r.topic}{" "}
                      <span style={{ fontSize: 12, color: T.textTertiary, fontWeight: 400 }}>
                        ({r.unit})
                      </span>
                    </div>
                    <div style={{ fontSize: 12, color: T.textTertiary, marginTop: 2 }}>
                      {r.pts}점 · 내 시간 {a ? fmtTime(a.timeSec) : "--"} / 권장 {r.rec}
                    </div>
                  </div>

                  {/* Points earned */}
                  <span
                    style={{
                      fontSize: 14,
                      fontWeight: 700,
                      color: ok ? T.correct : T.textFaint,
                      flexShrink: 0,
                    }}
                  >
                    {ok ? `+${r.pts}` : "0"}
                  </span>
                </div>
              );
            })}
          </div>

          {/* Action buttons */}
          <div style={{ display: "flex", gap: 12 }}>
            <button
              onClick={startQuiz}
              style={{
                flex: 1,
                padding: "14px 0",
                borderRadius: 14,
                border: `1.5px solid ${T.accent}`,
                background: T.surface,
                color: T.accent,
                fontSize: 15,
                fontWeight: 700,
                cursor: "pointer",
                fontFamily: "inherit",
                transition: "background .15s",
              }}
              onMouseEnter={(e) => (e.currentTarget.style.background = T.accentSoft)}
              onMouseLeave={(e) => (e.currentTarget.style.background = T.surface)}
            >
              다시 풀기
            </button>
            <button
              onClick={() => setScreen("intro")}
              style={{
                flex: 1,
                padding: "14px 0",
                borderRadius: 14,
                border: "none",
                background: T.accent,
                color: "#fff",
                fontSize: 15,
                fontWeight: 700,
                cursor: "pointer",
                fontFamily: "inherit",
                transition: "opacity .15s",
              }}
              onMouseEnter={(e) => (e.currentTarget.style.opacity = "0.9")}
              onMouseLeave={(e) => (e.currentTarget.style.opacity = "1")}
            >
              홈으로
            </button>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

/* ──────────── Mount ──────────── */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
