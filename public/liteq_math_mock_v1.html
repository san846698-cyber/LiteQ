/* ── Utility helpers ─────────────────────────────────── */
function parseRecSec(rec) {
  const [m, s] = rec.split(":").map(Number);
  return m * 60 + s;
}

function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2, "0")}`;
}

function fmtTimeLong(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  if (m > 0 && s > 0) return `${m}분 ${s}초`;
  if (m > 0) return `${m}분`;
  return `${s}초`;
}

function diffLabel(d) { return ["", "쉬움", "보통", "어려움", "킬러"][d] || ""; }
function diffColor(d) { return ["", T.correct, T.accent, T.wrong, "#8B5CF6"][d] || T.textSec; }

/* ── Tex Component ───────────────────────────────────── */
function Tex({ expr, display = false, style = {} }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.katex) {
      try {
        window.katex.render(expr, ref.current, {
          throwOnError: false,
          displayMode: display,
          trust: true,
          strict: false,
        });
      } catch (e) {
        ref.current.textContent = expr;
      }
    }
  }, [expr, display]);
  return React.createElement("span", { ref, style: { ...style } });
}

/* Render text that may contain inline \( ... \) LaTeX */
function MixedText({ text, style = {} }) {
  if (!text) return null;
  const parts = text.split(/(\\[(\[][\s\S]*?\\[)\]])/g);
  return React.createElement("span", { style }, parts.map((part, i) => {
    const m = part.match(/^\\[(\[]([\s\S]*?)\\[)\]]$/);
    if (m) {
      const display = part.startsWith("\\[");
      return React.createElement(Tex, { key: i, expr: m[2].trim(), display });
    }
    // Handle line breaks
    return part.split("\n").map((line, j, arr) =>
      React.createElement(React.Fragment, { key: `${i}-${j}` },
        line,
        j < arr.length - 1 ? React.createElement("br") : null
      )
    );
  }));
}

/* Render option text that may contain LaTeX */
function OptText({ text, style = {} }) {
  if (!text) return null;
  // Check if the option text (after the circled number) contains LaTeX-like content
  const parts = text.split(/(\\[a-zA-Z]+|\\dfrac|\\frac|\^|_|\{|\})/);
  const hasLatex = /\\[a-zA-Z]/.test(text) || /\\dfrac/.test(text);
  if (hasLatex) {
    // Extract the circled number prefix and render rest as LaTeX
    const circleMatch = text.match(/^([①②③④⑤]\s*)/);
    const prefix = circleMatch ? circleMatch[1] : "";
    const rest = circleMatch ? text.slice(prefix.length) : text;
    return React.createElement("span", { style },
      prefix,
      React.createElement(Tex, { expr: rest.trim() })
    );
  }
  return React.createElement("span", { style }, text);
}

/* ── Donut Chart Component ───────────────────────────── */
function DonutChart({ score, total, size = 140 }) {
  const pct = total > 0 ? score / total : 0;
  const r = (size - 16) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct);
  const color = pct >= 0.8 ? T.correct : pct >= 0.5 ? T.accent : T.wrong;

  return React.createElement("div", {
    style: { position: "relative", width: size, height: size, margin: "0 auto" }
  },
    React.createElement("svg", { width: size, height: size, viewBox: `0 0 ${size} ${size}` },
      React.createElement("circle", {
        cx: size / 2, cy: size / 2, r,
        fill: "none", stroke: T.border, strokeWidth: 10
      }),
      React.createElement("circle", {
        cx: size / 2, cy: size / 2, r,
        fill: "none", stroke: color, strokeWidth: 10,
        strokeLinecap: "round",
        strokeDasharray: circ,
        strokeDashoffset: offset,
        transform: `rotate(-90 ${size / 2} ${size / 2})`,
        style: { transition: "stroke-dashoffset 1.2s ease-out" }
      })
    ),
    React.createElement("div", {
      style: {
        position: "absolute", inset: 0,
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center"
      }
    },
      React.createElement("span", {
        style: { fontSize: 28, fontWeight: 700, color: T.text }
      }, score),
      React.createElement("span", {
        style: { fontSize: 13, color: T.textSec }
      }, `/ ${total}점`)
    )
  );
}

  const [phase, setPhase] = useState(PHASES.intro);

  // Quiz state
  const [curIdx, setCurIdx] = useState(0);
  const [answers, setAnswers] = useState({}); // { qId: selectedIndex (choice) or string (short) }
  const [timeLeft, setTimeLeft] = useState(TOTAL_TIME);
  const [timeSpent, setTimeSpent] = useState({}); // { qId: seconds }
  const [quizStarted, setQuizStarted] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);

  // Per-question time tracking
  const activeQRef = useRef(null);
  const activeStartRef = useRef(null);
  const timeSpentRef = useRef({});

  // Flush accumulated time for current question
  const flushTime = useCallback(() => {
    if (activeQRef.current !== null && activeStartRef.current !== null) {
      const elapsed = Math.round((Date.now() - activeStartRef.current) / 1000);
      const qId = activeQRef.current;
      timeSpentRef.current[qId] = (timeSpentRef.current[qId] || 0) + elapsed;
      setTimeSpent({ ...timeSpentRef.current });
    }
  }, []);

  // Start tracking for a question
  const startTracking = useCallback((qId) => {
    flushTime();
    activeQRef.current = qId;
    activeStartRef.current = Date.now();
  }, [flushTime]);

  // Navigate to question
  const goTo = useCallback((idx) => {
    startTracking(QUESTIONS[idx].id);
    setCurIdx(idx);
  }, [startTracking]);

  // Start quiz
  const handleStart = useCallback(() => {
    setPhase(PHASES.quiz);
    setQuizStarted(true);
    startTracking(QUESTIONS[0].id);
  }, [startTracking]);

  // Countdown timer
  useEffect(() => {
    if (phase !== PHASES.quiz || submitted) return;
    const iv = setInterval(() => {
      setTimeLeft(prev => {
        if (prev <= 1) {
          clearInterval(iv);
          // Auto-submit
          flushTime();
          setSubmitted(true);
          setPhase(PHASES.result);
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(iv);
  }, [phase, submitted, flushTime]);

  // Handle answer selection for choice questions
  const selectChoice = useCallback((qId, choiceIdx) => {
    if (submitted) return;
    setAnswers(prev => ({ ...prev, [qId]: choiceIdx }));
  }, [submitted]);

  // Handle answer input for short questions
  const setShortAnswer = useCallback((qId, value) => {
    if (submitted) return;
    setAnswers(prev => ({ ...prev, [qId]: value }));
  }, [submitted]);

  // Submit
  const handleSubmit = useCallback(() => {
    flushTime();
    setSubmitted(true);
    setPhase(PHASES.result);
  }, [flushTime]);

  const unansweredCount = useMemo(() => {
    return QUESTIONS.filter(q => answers[q.id] === undefined || answers[q.id] === "").length;
  }, [answers]);

  const totalRecSec = useMemo(() => QUESTIONS.reduce((s, q) => s + parseRecSec(q.rec), 0), []);
  const totalSpentSec = useMemo(() => Object.values(timeSpent).reduce((s, v) => s + v, 0), [timeSpent]);

  // Grading
  const results = useMemo(() => {
    if (!submitted) return [];
    return QUESTIONS.map(q => {
      const userAns = answers[q.id];
      let isCorrect = false;
      if (q.mode === "choice") {
        isCorrect = userAns === q.ans;
      } else {
        isCorrect = String(userAns).trim() === String(q.ans);

      return {
        ...q,
        userAns,
        isCorrect,
        earnedPts: isCorrect ? q.pts : 0,
        recSec: parseRecSec(q.rec),
        spentSec: timeSpent[q.id] || 0,

          React.createElement(DonutChart, { score: totalScore, total: TOTAL_POINTS }),
          React.createElement("p", {
            style: { fontSize: 15, color: T.text, marginTop: 16, fontWeight: 600, lineHeight: 1.6 }
          }, encouragement),
        ),

        // ---- Time summary card ----
        React.createElement("div", {
          className: "fade-in",
          style: {
            background: T.surface, borderRadius: 16, padding: "20px 18px",
            margin: "0 0 20px", border: `1px solid ${T.border}`,
          }
        },
          React.createElement("h3", {
            style: { fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 14 }
          }, "\u23F1 시간 분석"),
          React.createElement("div", {
            style: {
              display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 16,
            }
          },
            ...[
              { label: "제한시간", value: "60:00", color: T.textSec },
              { label: "총 소요", value: fmtTime(actualTotalTime), color: actualTotalTime > TOTAL_TIME ? T.wrong : T.text },
              { label: "총 권장", value: fmtTime(totalRecSec), color: T.textSec },
            ].map((item, i) =>
              React.createElement("div", {
                key: i,
                style: {
                  textAlign: "center", background: T.tagBg, borderRadius: 10, padding: "10px 6px",
                }
              },
                React.createElement("div", {
                  style: { fontSize: 18, fontWeight: 700, color: item.color, fontVariantNumeric: "tabular-nums" }
                }, item.value),
                React.createElement("div", {
                  style: { fontSize: 11, color: T.textSec, marginTop: 2 }
                }, item.label)
              )
            )
          ),
          React.createElement("p", {
            style: { fontSize: 13, color: T.textSec, lineHeight: 1.5 }
          }, timeMsg),
          worstTime.q && worstTime.over > 30 ? React.createElement("p", {
            style: {
              fontSize: 13, color: T.accent, marginTop: 8, lineHeight: 1.5,
              background: T.accentSoft, padding: "8px 12px", borderRadius: 8,
            }
          }, `Q${worstTime.q.id}에서 ${fmtTimeLong(worstTime.q.spentSec)}를 사용했어요. ${worstTime.q.pts}점 문항에 집중하되, 시간 배분에 주의하세요.`) : null
        ),

        // ---- Per-question time comparison table ----
        React.createElement("div", {
          className: "fade-in",
          style: {
            background: T.surface, borderRadius: 16, padding: "20px 14px",
            margin: "0 0 20px", border: `1px solid ${T.border}`,
          }
        },
          React.createElement("h3", {
            style: { fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 16 }
          }, "문항별 시간 비교"),
          // Table header
          React.createElement("div", {
            style: {
              display: "grid",
              gridTemplateColumns: "36px 1fr 36px 28px 58px 58px 1fr",
              gap: 4, alignItems: "center",
              padding: "8px 4px", borderBottom: `1px solid ${T.border}`,
              fontSize: 11, color: T.textTertiary, fontWeight: 600,
            }
          },
            React.createElement("span", null, "번호"),
            React.createElement("span", null, "유형"),
            React.createElement("span", { style: { textAlign: "center" } }, "배점"),
            React.createElement("span", { style: { textAlign: "center" } }, "O/X"),
            React.createElement("span", { style: { textAlign: "center" } }, "권장"),
            React.createElement("span", { style: { textAlign: "center" } }, "실제"),
            React.createElement("span", null, ""),
          ),
          // Rows
          ...results.map((r, i) => {
            const overTime = r.spentSec > r.recSec;
            const barColor = overTime ? T.wrong : T.correct;
            const recPct = Math.min((r.recSec / maxTime) * 100, 100);
            const spentPct = Math.min((r.spentSec / maxTime) * 100, 100);

            return React.createElement("div", {
              key: r.id,
              style: {
                display: "grid",
                gridTemplateColumns: "36px 1fr 36px 28px 58px 58px 1fr",
                gap: 4, alignItems: "center",
                padding: "10px 4px",
                borderBottom: i < results.length - 1 ? `1px solid ${T.border}` : "none",
                background: r.isCorrect ? "transparent" : T.wrongSoft,
              }
            },
              // Number
              React.createElement("span", {
                style: { fontSize: 13, fontWeight: 600, color: T.accent }
              }, `Q${r.id}`),
              // Topic
              React.createElement("span", {
                style: {
                  fontSize: 11, color: T.textSec,
                  overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                }
              }, r.topic),
              // Points
              React.createElement("span", {
                style: { fontSize: 12, fontWeight: 600, color: T.text, textAlign: "center" }
              }, `${r.pts}점`),
              // O/X
              React.createElement("span", {
                style: {
                  fontSize: 15, textAlign: "center", fontWeight: 700,
                  color: r.isCorrect ? T.correct : T.wrong,
                }
              }, r.isCorrect ? "\u2713" : "\u2717"),
              // Recommended time
              React.createElement("span", {
                style: { fontSize: 12, color: T.textSec, textAlign: "center", fontVariantNumeric: "tabular-nums" }
              }, r.rec),
              // Actual time
              React.createElement("span", {
                style: {
                  fontSize: 12, fontWeight: 600, textAlign: "center",
                  color: overTime ? T.wrong : T.correct,
                  fontVariantNumeric: "tabular-nums",
                }
              }, fmtTime(r.spentSec)),
              // Bar chart
              React.createElement("div", {
                style: { position: "relative", height: 16, borderRadius: 4, overflow: "hidden" }
              },
                // Recommended (gray background bar)
                React.createElement("div", {
                  style: {
                    position: "absolute", top: 0, left: 0,
                    height: "100%", borderRadius: 4,
                    background: T.tagBg,
                    width: `${recPct}%`,
                  }
                }),
                // Actual (colored bar)
                React.createElement("div", {
                  className: "bar-grow",
                  style: {
                    position: "absolute", top: 2, left: 0,
                    height: 12, borderRadius: 3,
                    background: barColor,
                    opacity: 0.7,
                    "--bar-w": `${spentPct}%`,
                    width: `${spentPct}%`,
                  }
                }),
                // Over-time tag
                overTime ? React.createElement("span", {
                  style: {
                    position: "absolute", right: 2, top: 1,
                    fontSize: 9, color: T.wrong, fontWeight: 700,
                    background: "rgba(255,255,255,0.85)", padding: "0 4px", borderRadius: 3,
                  }
                }, "초과") : null
              )
            );
          })
        ),

        // ---- Detailed Solutions ----
        React.createElement("div", {
          style: { marginBottom: 20 }
        },
          React.createElement("h3", {
            style: {
              fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 14, padding: "0 4px",
            }
          }, "상세 해설"),
          ...results.map((r, i) =>
            React.createElement("details", {
              key: r.id,
              style: {
                background: T.surface, borderRadius: 14, marginBottom: 10,
                border: `1px solid ${r.isCorrect ? T.correctBorder : T.wrongBorder}`,
                overflow: "hidden",
              }
            },
              React.createElement("summary", {
                style: {
                  padding: "14px 16px", cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 10,
                  fontSize: 14, color: T.text, fontWeight: 500,
                  listStyle: "none",
                }
              },
                React.createElement("span", {
                  style: {
                    display: "inline-flex", alignItems: "center", justifyContent: "center",
                    width: 28, height: 28, borderRadius: "50%",
                    background: r.isCorrect ? T.correctSoft : T.wrongSoft,
                    color: r.isCorrect ? T.correct : T.wrong,
                    fontSize: 14, fontWeight: 700, flexShrink: 0,
                  }
                }, r.isCorrect ? "\u2713" : "\u2717"),
                React.createElement("span", { style: { flex: 1 } },
                  `${r.id}번 `,
                  React.createElement("span", { style: { color: T.textSec, fontSize: 12 } },
                    `${r.topic} \u00B7 ${r.type}`
                  )
                ),
                React.createElement("span", {
                  style: {
                    fontSize: 12, fontWeight: 600,
                    color: r.isCorrect ? T.correct : T.wrong,
                  }
                }, r.isCorrect ? `+${r.pts}점` : "0점"),
                React.createElement("span", {
                  style: { fontSize: 16, color: T.textTertiary, marginLeft: 4 }
                }, "\u25BC")
              ),
              React.createElement("div", {
                style: {
                  padding: "0 16px 16px", borderTop: `1px solid ${T.border}`,
                }
              },
                // User answer vs correct
                React.createElement("div", {
                  style: {
                    display: "flex", gap: 12, marginTop: 12, marginBottom: 14,
                    fontSize: 13, flexWrap: "wrap",
                  }
                },
                  React.createElement("span", {
                    style: {
                      padding: "4px 10px", borderRadius: 6,
                      background: T.wrongSoft, color: T.wrong,
                    }
                  }, r.mode === "choice"
                    ? `내 답: ${r.userAns !== undefined ? `${r.userAns + 1}번` : "미답"}`
                    : `내 답: ${r.userAns || "미답"}`
                  ),
                  React.createElement("span", {
                    style: {
                      padding: "4px 10px", borderRadius: 6,
                      background: T.correctSoft, color: T.correct,
                    }
                  }, r.mode === "choice"
                    ? `정답: ${r.ans + 1}번`
                    : `정답: ${r.ans}`
                  ),
                ),
                // Solution text
                React.createElement("div", {
                  style: { fontSize: 14, color: T.text, lineHeight: 1.8, marginBottom: 10 }
                },
                  React.createElement(MixedText, { text: r.solution })
                ),
                // Solution LaTeX
                r.solTex ? React.createElement("div", {
                  style: {
                    background: T.tagBg, borderRadius: 10, padding: "12px 14px",
                    textAlign: "center", marginBottom: r.solNote ? 10 : 0,
                  }
                }, React.createElement(Tex, { expr: r.solTex, display: true })) : null,
                // Solution note
                r.solNote ? React.createElement("div", {
                  style: {
                    fontSize: 13, color: T.accent, fontStyle: "italic",
                    background: T.accentSoft, padding: "8px 12px", borderRadius: 8,
                  }
                }, r.solNote) : null,
              )
            )
          )
        ),

        // ---- Retry Button ----
        React.createElement("button", {
          onClick: () => {
            setPhase(PHASES.intro);
            setCurIdx(0);
            setAnswers({});
            setTimeLeft(TOTAL_TIME);
            setTimeSpent({});
            timeSpentRef.current = {};
            setSubmitted(false);
            setQuizStarted(false);
          },
          style: {
            width: "100%", padding: "16px 0", borderRadius: 14, border: "none",
            background: "linear-gradient(135deg, #C96442, #D4784E)",
            color: "#fff", fontSize: 17, fontWeight: 700, cursor: "pointer",
            marginBottom: 20,
          }
        }, "다시 풀기"),
      )
    );
  }

  return null;
}

/* ── Mount ───────────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

  </script>
</body>
</html>
